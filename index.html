<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Boat Manager</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Boat Manager">
<link rel="apple-touch-icon" id="appIcon">
<link rel="icon" id="favIcon">
<style>
:root {
  --bg:#f2f2f7;--surface:#fff;--surface2:#f2f2f7;--blue:#007aff;--blue-dk:#0051a8;
  --label:#000;--label2:rgba(60,60,67,.8);--label3:rgba(60,60,67,.6);
  --sep:#c6c6c8;--green:#34c759;--red:#ff3b30;--orange:#ff9500;--yellow:#ffcc00;
  --radius:12px;--font:-apple-system,'SF Pro Text','Helvetica Neue',Arial,sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#000;--surface:#1c1c1e;--surface2:#2c2c2e;--label:#fff;
    --label2:rgba(235,235,245,.8);--label3:rgba(235,235,245,.6);--sep:#38383a;}
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--label);min-height:100vh;font-size:17px}

/* ── Header ── */
.hdr{background:#1a1a1a;border-bottom:1px solid rgba(255,255,255,.08);padding:12px 16px 10px;
  position:sticky;top:0;z-index:300;text-align:center}
.hdr img{height:34px;width:auto;object-fit:contain}
.hdr-sub{font-size:13px;color:#999;margin-top:2px}

/* ── Alert bar ── */
.alert-bar{background:var(--surface);border-bottom:1px solid var(--sep)}
.alert-toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;
  cursor:pointer;font-size:14px;font-weight:600}
.alert-toggle .badge-count{background:var(--red);color:#fff;border-radius:10px;
  padding:1px 7px;font-size:12px;font-weight:700;margin-left:8px}
.alert-list{border-top:1px solid var(--sep)}
.alert-row{display:flex;align-items:center;gap:10px;padding:9px 16px;
  border-bottom:1px solid var(--sep);font-size:13px}
.alert-row:last-child{border-bottom:none}
.adot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.adot.red{background:var(--red)}.adot.orange{background:var(--orange)}.adot.yellow{background:var(--yellow)}
.alert-txt{flex:1;color:var(--label)}
.alert-days{color:var(--label3);font-size:12px}
.no-alerts{padding:10px 16px;font-size:13px;color:var(--green)}

/* ── Tabs ── */
.tab-bar{background:var(--surface);border-bottom:1px solid var(--sep);
  overflow-x:auto;display:flex;gap:6px;padding:8px 12px;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;background:var(--surface2);border:1.5px solid var(--sep);border-radius:8px;
  font-family:var(--font);font-size:12px;font-weight:600;color:var(--label2);
  padding:7px 10px;cursor:pointer;white-space:nowrap;transition:all .15s}
.tab-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ── Sub-tabs (pill style) ── */
.subtab-bar{background:var(--surface2);border-bottom:1px solid var(--sep);
  overflow-x:auto;display:flex;gap:8px;padding:8px 16px;scrollbar-width:none}
.subtab-bar::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;border:1px solid var(--sep);background:var(--surface);
  font-family:var(--font);font-size:14px;font-weight:500;color:var(--label2);
  padding:6px 14px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:all .15s}
.pill.active{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ── Main content ── */
main{padding:14px 16px 100px;max-width:680px;margin:0 auto}
.sec{display:none}.sec.active{display:block}
.sec-hd{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;
  color:var(--label3);margin:18px 4px 8px}

/* ── Cards ── */
.card{background:var(--surface);border-radius:var(--radius);overflow:hidden;
  margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-hd{background:var(--surface2);padding:10px 16px;font-size:13px;font-weight:700;
  color:var(--blue);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--sep);
  display:flex;align-items:center;justify-content:space-between}
.card-hd-btn{font-size:12px;font-weight:600;color:var(--blue);background:none;border:none;
  cursor:pointer;font-family:var(--font);padding:0}

/* ── Form rows ── */
.fr{display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid var(--sep);gap:12px;min-height:46px}
.fr:last-child{border-bottom:none}
.fl{font-size:13px;color:var(--label3);width:130px;flex-shrink:0;line-height:1.3}
.fv{flex:1;font-size:15px;font-weight:500;color:var(--label);text-align:right}
.fi{flex:1;border:none;background:transparent;font-family:var(--font);font-size:15px;
  font-weight:500;color:var(--label);outline:none;text-align:right;width:100%}
.fi::placeholder{color:var(--label3)}
.fi-left{text-align:left}
.fi-area{flex:1;border:none;background:transparent;font-family:var(--font);font-size:14px;
  color:var(--label);outline:none;resize:none;min-height:52px;padding:2px 0;width:100%}
select.fi{-webkit-appearance:none}

/* ── Buttons ── */
.btn{border:none;border-radius:10px;padding:10px 18px;font-family:var(--font);
  font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.75}
.btn-p{background:var(--blue);color:#fff}
.btn-s{background:var(--surface2);color:var(--blue);border:1.5px solid var(--sep)}
.btn-d{background:rgba(255,59,48,.1);color:var(--red)}
.btn-sm{padding:6px 12px;font-size:13px;border-radius:8px}
.btn-xs{padding:4px 10px;font-size:12px;border-radius:7px}
.btn-row{display:flex;gap:8px;padding:12px 16px;flex-wrap:wrap}

/* ── Badges ── */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:600}
.b-red{background:rgba(255,59,48,.12);color:var(--red)}
.b-orange{background:rgba(255,149,0,.12);color:var(--orange)}
.b-green{background:rgba(52,199,89,.12);color:var(--green)}
.b-blue{background:rgba(0,122,255,.1);color:var(--blue)}

/* ── Table ── */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:var(--surface2);padding:7px 10px;text-align:left;font-size:11px;
  font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--label3);
  border-bottom:1px solid var(--sep)}
.tbl td{padding:9px 10px;border-bottom:1px solid var(--sep);color:var(--label);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}

/* ── Crew cards ── */
.crew-card{background:var(--surface);border-radius:var(--radius);margin-bottom:10px;
  overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.crew-hdr{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer}
.crew-av{width:42px;height:42px;border-radius:50%;background:var(--blue);display:flex;
  align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff;flex-shrink:0}
.crew-body{display:none;border-top:1px solid var(--sep)}
.crew-body.open{display:block}

/* ── Maintenance ── */
.hours-box{text-align:center;padding:22px 16px 16px}
.hours-num{font-size:60px;font-weight:700;letter-spacing:-2px;line-height:1;color:var(--label)}
.hours-lbl{font-size:13px;color:var(--label3);margin-top:4px}
.hours-edit{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:12px}
.h-btn{width:38px;height:38px;border-radius:50%;border:none;background:var(--surface2);
  font-size:20px;font-weight:700;color:var(--label);cursor:pointer}
.h-input{width:80px;border:1.5px solid var(--sep);border-radius:10px;padding:8px;
  font-family:var(--font);font-size:17px;text-align:center;background:var(--surface);
  color:var(--label);outline:none}
.maint-row{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;
  border-bottom:1px solid var(--sep)}
.maint-row:last-child{border-bottom:none}
.mdot{width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:3px}
.mdot.green{background:var(--green)}.mdot.orange{background:var(--orange)}.mdot.red{background:var(--red)}
.m-info{flex:1}
.m-task{font-size:14px;font-weight:500;color:var(--label)}
.m-meta{font-size:12px;color:var(--label3);margin-top:2px;line-height:1.5}
.m-due{font-size:12px;font-weight:600;margin-top:2px}
.m-due.green{color:var(--green)}.m-due.orange{color:var(--orange)}.m-due.red{color:var(--red)}

/* ── Spare parts ── */
.parts-top{display:flex;gap:8px;margin-bottom:10px}
.search-box{flex:1;border:1.5px solid var(--sep);border-radius:10px;padding:9px 14px;
  font-family:var(--font);font-size:14px;background:var(--surface);color:var(--label);
  outline:none}
.search-box:focus{border-color:var(--blue)}
.part-row{display:flex;align-items:center;gap:10px;padding:11px 14px;
  border-bottom:1px solid var(--sep)}
.part-row:last-child{border-bottom:none}
.qty-wrap{display:flex;align-items:center;gap:5px;flex-shrink:0}
.qb{width:26px;height:26px;border-radius:50%;border:none;background:var(--surface2);
  color:var(--label);font-size:15px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.qn{min-width:22px;text-align:center;font-size:15px;font-weight:600}
.qn.low{color:var(--red)}
.p-info{flex:1;min-width:0}
.p-desc{font-size:14px;font-weight:500;color:var(--label);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.p-meta{font-size:11px;color:var(--label3);margin-top:2px}
.parts-footer{padding:10px 14px;font-size:14px;font-weight:600;
  color:var(--label);text-align:right;border-top:1px solid var(--sep)}

/* ── Systems ── */
.sys-card{background:var(--surface);border-radius:var(--radius);margin-bottom:8px;
  overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.sys-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer}
.sys-icon{font-size:20px;flex-shrink:0}
.sys-body{display:none;border-top:1px solid var(--sep)}
.sys-body.open{display:block}

/* ── Logbook ── */
.log-card{background:var(--surface);border-radius:var(--radius);margin-bottom:10px;
  padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.log-date{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;color:var(--label3)}
.log-route{font-size:18px;font-weight:700;color:var(--label);margin-top:3px}
.log-stats{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap}
.log-stat{font-size:12px;color:var(--label2)}
.log-stat b{color:var(--label)}

/* ── Photos ── */
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.photo-item{border-radius:var(--radius);overflow:hidden;background:var(--surface2);position:relative}
.photo-item img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;cursor:pointer}
.photo-cap{padding:6px 10px;font-size:12px;color:var(--label2);border:none;background:transparent;
  width:100%;font-family:var(--font);outline:none}
.photo-del{position:absolute;top:5px;right:5px;background:rgba(0,0,0,.55);color:#fff;
  border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.upload-zone{border:2px dashed var(--sep);border-radius:var(--radius);padding:24px;
  text-align:center;cursor:pointer;color:var(--label3);font-size:14px}
.upload-zone:hover{border-color:var(--blue);color:var(--blue)}

/* ── Shipyard ── */
.quote-row{display:flex;align-items:center;gap:8px;padding:10px 14px;
  border-bottom:1px solid var(--sep)}
.quote-row:last-child{border-bottom:none}

/* ── Setup ── */
.setup-over{position:fixed;inset:0;background:var(--bg);z-index:1000;overflow-y:auto}
.setup-inner{max-width:420px;margin:0 auto;padding:40px 24px 80px}
.setup-logo{text-align:center;margin-bottom:28px}
.setup-logo img{height:44px}
.setup-h{font-size:26px;font-weight:700;color:var(--label);letter-spacing:-.5px;margin-bottom:6px}
.setup-sub{font-size:15px;color:var(--label3);margin-bottom:28px}
.setup-lbl{display:block;font-size:12px;font-weight:600;color:var(--label2);
  margin-bottom:8px;text-transform:uppercase;letter-spacing:.3px}
.setup-inp{width:100%;border:1.5px solid var(--sep);border-radius:12px;padding:13px 16px;
  font-family:var(--font);font-size:17px;background:var(--surface);color:var(--label);
  outline:none;margin-bottom:18px}
.setup-inp:focus{border-color:var(--blue)}
.hull-row{display:flex;gap:10px;margin-bottom:18px}
.hull-opt{flex:1;border:2px solid var(--sep);border-radius:12px;padding:14px 10px;
  text-align:center;cursor:pointer;transition:all .15s}
.hull-opt.sel{border-color:var(--blue);background:rgba(0,122,255,.07)}
.hull-icon{font-size:28px;margin-bottom:6px}
.hull-lbl{font-size:15px;font-weight:600;color:var(--label)}
.hull-sub{font-size:11px;color:var(--label3);margin-top:2px}
.setup-go{width:100%;background:var(--blue);color:#fff;border:none;border-radius:14px;
  padding:16px;font-family:var(--font);font-size:17px;font-weight:600;cursor:pointer;margin-top:4px}

/* ── Modal bottom sheet ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;
  display:flex;align-items:flex-end}
.modal-ov.hide{display:none}
.modal-sh{background:var(--surface);border-radius:20px 20px 0 0;width:100%;
  max-height:88vh;overflow-y:auto;padding:18px 18px 50px}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--sep);margin:0 auto 14px}
.modal-title{font-size:19px;font-weight:700;color:var(--label);margin-bottom:16px}
.mi{width:100%;border:1.5px solid var(--sep);border-radius:10px;padding:11px 14px;
  font-family:var(--font);font-size:15px;background:var(--surface);color:var(--label);
  outline:none;margin-bottom:12px}
.mi:focus{border-color:var(--blue)}
.mi-label{font-size:12px;font-weight:600;color:var(--label3);margin-bottom:4px;
  text-transform:uppercase;letter-spacing:.3px}
.modal-btns{display:flex;gap:10px;margin-top:6px}

/* ── Tip box ── */
.tip{background:rgba(0,122,255,.08);border-radius:var(--radius);padding:12px 16px;
  margin:10px 0;font-size:13px;color:var(--label2);line-height:1.55;
  border-left:4px solid var(--blue)}

/* ── Backup bar ── */
.backup-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);
  border-top:1px solid var(--sep);padding:8px 16px;display:flex;align-items:center;
  justify-content:space-between;z-index:100;box-shadow:0 -1px 6px rgba(0,0,0,.06)}
.backup-bar-txt{font-size:12px;color:var(--label3)}
.backup-bar-txt b{color:var(--label);font-weight:600}
@media print{ .backup-bar{display:none!important} }

/* ── Print ── */
@media print{
  .hdr,.tab-bar,.subtab-bar,.alert-bar,.btn,.btn-row,.no-print{display:none!important}
  body{background:#fff}
  .card{box-shadow:none;border:1px solid #ddd;margin-bottom:10px}
  .sec{display:block!important}
  main{padding:0;max-width:none}
}

/* ── Utils ── */
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-8{gap:8px}.gap-4{gap:4px}.mt-4{margin-top:4px}.mt-8{margin-top:8px}
.mt-16{margin-top:16px}.mb-8{margin-bottom:8px}.w-full{width:100%}
.text-right{text-align:right}.text-center{text-align:center}
.text-label3{color:var(--label3)}.text-sm{font-size:13px}.text-xs{font-size:12px}
.font-600{font-weight:600}.hidden{display:none!important}
input[type=file]{display:none}

</style>
</head>
<body>

<div id="setupOv" class="setup-over hidden"></div>
<div id="app" class="hidden"></div>
<div id="modalOv" class="modal-ov hide">
  <div class="modal-sh" id="modalSh">
    <div class="modal-handle"></div>
    <div id="modalBody"></div>
  </div>
</div>

<input type="file" id="photoFile"  accept="image/*"        onchange="handlePhotoUpload(this)">
<input type="file" id="importFile" accept=".json"          onchange="handleImport(this)">
<input type="file" id="backupFile" accept=".json,text/json" onchange="loadBackupFile(this)">

<script src="logo.js"></script>
<script src="oroboro-icon.js"></script>
<script src="oroboro-data.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  CONSTANTS & DEFAULTS
// ═══════════════════════════════════════════════════════════

const ENC_KEY      = 'bm_enc';        // AES-GCM encrypted app data
const SALT_KEY     = 'bm_salt';       // random PBKDF2 salt (not sensitive)
const VERIFY_KEY   = 'bm_verify';     // encrypted canary for password verification
const ATTEMPTS_KEY = 'bm_attempts';   // {count, lockUntil}
const BACKUP_TS    = 'bm_last_backup';// timestamp of last manual backup
const logoSrc = (typeof OROBORO_LOGO !== 'undefined') ? OROBORO_LOGO : '';

// ── Crypto runtime state (memory only — never persisted) ───────
let cryptoKey    = null;   // CryptoKey object; null = locked
let lastActivity = 0;
let lockTimer    = null;
const LOCK_MS    = 5 * 60 * 1000;  // auto-lock after 5 min idle
const MAX_FAILS  = 5;              // attempts before lockout
const LOCKOUT_MS = 30 * 1000;      // lockout duration

// Yanmar maintenance schedule template
const YANMAR_SCHED = [
  {id:'y50',   interval:50,   task:'Check raw water pump belts, visual inspection'},
  {id:'y250',  interval:250,  task:'Engine oil & filter, fuel filter, zinc anodes check'},
  {id:'y500',  interval:500,  task:'Full service — impeller, raw water pump, sail drive oil change, all filters'},
  {id:'y1000', interval:1000, task:'Valve clearance, injectors, heat exchanger clean, shaft seals'},
  {id:'y2000', interval:2000, task:'Major overhaul'},
];

function freshSchedule() {
  return YANMAR_SCHED.map(t => ({...t, lastDoneAt:0}));
}

// Spare parts template (engine-bay parts, before cat/mono split)
const ENGINE_PARTS = [
  {pn:'128370-13201',    desc:'Heat Exchanger gasket',            qty:4,  min:2, price:0},
  {pn:'128370-13530',    desc:'Exhaust Elbow',                    qty:2,  min:1, price:94},
  {pn:'119305-35170-9',  desc:'Engine Oil filter',                qty:2,  min:1, price:8},
  {pn:'104500-55710',    desc:'Fuel filter 10-15 microns',        qty:4,  min:2, price:15},
  {pn:'24341-000440',    desc:'Fuel filter O-ring',               qty:10, min:4, price:0},
  {pn:'R2010PM-or',      desc:'Racor filter 10 microns',          qty:2,  min:1, price:18},
  {pn:'128990-42570',    desc:'Impeller',                         qty:6,  min:2, price:26},
  {pn:'128990-77580',    desc:'Flat belts',                       qty:5,  min:2, price:18},
  {pn:'25111-002100',    desc:'V belts M21',                      qty:5,  min:2, price:13},
  {pn:'196450-02501',    desc:'Half Moon Anodes',                 qty:4,  min:2, price:17},
  {pn:'796420-09200',    desc:'SD25 Prop Nuts',                   qty:2,  min:1, price:126},
  {pn:'24341-000125',    desc:'O-Rings Oil drain',                qty:9,  min:4, price:2},
  {pn:'196420-02530',    desc:'Oil Drain Plug M10',               qty:4,  min:2, price:33},
  {pn:'128995-42500',    desc:'Water pump assembly',              qty:2,  min:1, price:251},
  {pn:'27210-200550',    desc:'Sail drive anodes internal',       qty:4,  min:2, price:10.73},
  {pn:'196420-12240',    desc:'Sail Drive O-ring',                qty:7,  min:3, price:0},
  {pn:'196313-02591',    desc:'Shaft lip seals',                  qty:6,  min:2, price:34.9},
  {pn:'24321-000950',    desc:'Sail Drive Shaft o-rings',         qty:4,  min:2, price:13.55},
  {pn:'',                desc:'Engine oil 15W40 5L Shell',        qty:6,  min:2, price:25},
  {pn:'',                desc:'Sail Drive oil 80W90 5L Shell',    qty:1,  min:1, price:28},
];
const SUZUKI_PARTS = [
  {pn:'1098 BR7HS-10', desc:'Spark plugs',   qty:2, min:1, price:0},
  {pn:'',              desc:'Impeller',       qty:1, min:1, price:0},
  {pn:'',              desc:'Head gasket',    qty:1, min:1, price:0},
];

function makeParts(hullType) {
  const parts = [];
  if (hullType === 'catamaran') {
    ['Port Engine','Starboard Engine'].forEach((cat, ci) => {
      ENGINE_PARTS.forEach((p,i) => parts.push({
        id:`${ci===0?'port':'stbd'}_${i}`, category:cat,
        location:`${ci===0?'port':'starboard'} engine bay`,
        ...p, qty:p.qty, unitPrice:p.price
      }));
    });
  } else {
    ENGINE_PARTS.forEach((p,i) => parts.push({
      id:`main_${i}`, category:'Yanmar Engine',
      location:'engine bay', ...p, unitPrice:p.price
    }));
  }

function uid(){ return '_'+Math.random().toString(36).slice(2,9)+Date.now().toString(36); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function daysUntil(dateStr) {
  if (!dateStr) return 9999;
  const d = new Date(dateStr); const now = new Date();
  now.setHours(0,0,0,0); d.setHours(0,0,0,0);
  return Math.round((d - now) / 86400000);
}

function fmtDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

function alertColor(days, threshold) {
  if (days < 0) return 'red';
  if (days <= threshold * 0.25) return 'red';
  if (days <= threshold * 0.5) return 'orange';
  return 'yellow';
}

function expiryBadge(dateStr, threshold=90) {
  const d = daysUntil(dateStr);
  if (d > threshold) return '';
  const cls = d < 0 ? 'b-red' : d < threshold*0.3 ? 'b-red' : 'b-orange';
  const txt = d < 0 ? `Expired ${Math.abs(d)}d ago` : `Expires in ${d}d`;
  return `<span class="badge ${cls}">${txt}</span>`;
}

function maintStatus(task, currentHours) {
  const nextDue = task.lastDoneAt + task.interval;
  const remaining = nextDue - currentHours;
  if (remaining <= 0) return {color:'red', label:`${Math.abs(remaining)}h overdue`};
  if (remaining <= task.interval * 0.2) return {color:'orange', label:`${remaining}h remaining`};
  return {color:'green', label:`${remaining}h remaining`};
}

function calcSchengen(log) {
  const now = new Date(); now.setHours(23,59,59,999);
  const win = new Date(now); win.setDate(win.getDate()-180); win.setHours(0,0,0,0);
  let days = 0;
  (log||[]).forEach(e => {
    const entry = new Date(e.entryDate); const exit = e.exitDate ? new Date(e.exitDate) : now;
    const s = entry < win ? win : entry;
    const end = exit > now ? now : exit;
    if (s <= end) days += Math.ceil((end-s)/86400000)+1;
  });
  return days;
}

function initials(name) {
  return (name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
}

// ── Low-level base64 / Uint8Array helpers ─────────────────────
function u8ToB64(u8) {
  let s = ''; for (let i = 0; i < u8.length; i++) s += String.fromCharCode(u8[i]);
  return btoa(s);
}
function b64ToU8(b64) {
  const s = atob(b64); const u = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++) u[i] = s.charCodeAt(i); return u;
}

// ── Key derivation (PBKDF2 → AES-GCM 256) ─────────────────────
async function getOrCreateSalt() {
  let b = localStorage.getItem(SALT_KEY);
  if (!b) { b = u8ToB64(crypto.getRandomValues(new Uint8Array(16))); localStorage.setItem(SALT_KEY, b); }
  return b64ToU8(b);
}

async function deriveKey(password, salt) {
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(password),
    { name:'PBKDF2' }, false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations:100000, hash:'SHA-256' },
    km, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']);
}

// ── AES-GCM encrypt / decrypt ──────────────────────────────────
async function aesEncrypt(key, plaintext) {
  const iv  = crypto.getRandomValues(new Uint8Array(12));
  const ct  = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, new TextEncoder().encode(plaintext));
  return JSON.stringify({ iv: u8ToB64(iv), data: u8ToB64(new Uint8Array(ct)) });
}
async function aesDecrypt(key, storedJson) {
  const s  = JSON.parse(storedJson);
  const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64ToU8(s.iv) }, key, b64ToU8(s.data));
  return new TextDecoder().decode(pt);
}

// ── Encrypted save / load ──────────────────────────────────────
async function save() {
  if (!cryptoKey) return;
  try {
    const enc = await aesEncrypt(cryptoKey, JSON.stringify(data));
    localStorage.setItem(ENC_KEY, enc);
  } catch(e) { console.warn('Save failed', e); }
}

async function load() {
  if (!cryptoKey) return false;
  try {
    const raw = localStorage.getItem(ENC_KEY);
    if (!raw) return false;
    data = JSON.parse(await aesDecrypt(cryptoKey, raw));
    return true;
  } catch(e) { return false; }
}

function saveField(path, value) {
  const parts = path.split('.');
  let obj = data;
  for (let i = 0; i < parts.length-1; i++) {
    if (obj[parts[i]] === undefined) obj[parts[i]] = {};
    obj = obj[parts[i]];
  }
  obj[parts[parts.length-1]] = value;
  save(); // async fire-and-forget — data already updated in memory
  renderAlertBar();
}

// ── Encrypted export / import ──────────────────────────────────
async function exportSection(section) {
  if (!cryptoKey) return;
  const payload = section === 'all' ? data : { [section]: data[section], meta: data.meta };
  // Embed salt so import works cross-device with same password
  const exportSalt = u8ToB64(b64ToU8(localStorage.getItem(SALT_KEY)));
  const plaintext = JSON.stringify({ salt: exportSalt, payload });
  const iv  = crypto.getRandomValues(new Uint8Array(12));
  const ct  = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, cryptoKey, new TextEncoder().encode(plaintext));
  const blob = new Blob([JSON.stringify({ iv: u8ToB64(iv), data: u8ToB64(new Uint8Array(ct)) })], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `BM_${section}_${new Date().toISOString().slice(0,10)}_enc.json`;
  a.click();
}

function handleImport(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const fileJson = JSON.parse(e.target.result);
      // Ask for the password used to encrypt this export
      showModal('Import — Enter Password', `
        <div style="font-size:14px;color:var(--label2);margin-bottom:14px">
          Enter the password that was used when this backup was exported.
        </div>
        <div class="mi-label">Password</div>
        <input class="mi" type="password" id="imp-pw" placeholder="Export password" autofocus>
        <div id="imp-err" style="color:var(--red);font-size:13px;min-height:18px;margin-bottom:8px"></div>
        <div class="modal-btns">
          <button class="btn btn-s" onclick="hideModal()">Cancel</button>
          <button class="btn btn-p" onclick="doImport(${JSON.stringify(JSON.stringify(fileJson))})">Import</button>
        </div>`);
    } catch { showToast('Import failed — invalid file', true); }
    input.value = '';
  };
  reader.readAsText(file);
}

async function doImport(fileJsonStr) {
  const pw = document.getElementById('imp-pw')?.value;
  const errEl = document.getElementById('imp-err');
  if (!pw) { if(errEl) errEl.textContent='Password required'; return; }
  try {
    const fileJson = JSON.parse(fileJsonStr);
    // Re-derive key using the embedded salt from the export
    const inner   = JSON.parse(await aesDecrypt(cryptoKey, JSON.stringify(fileJson)));
    const imp     = inner.payload;
    deepMerge(data, imp);
    await save();
    hideModal(); renderApp(); showToast('Data imported successfully');
  } catch(e) {
    // Maybe a different password — try re-deriving from export salt
    try {
      const fileJson = JSON.parse(fileJsonStr);
      const tmpSalt  = b64ToU8(JSON.parse(atob(fileJson.data.split('').slice(0,0).join(''))));
      // Fallback: just try current key
      throw e;
    } catch {
      if (errEl) errEl.textContent = 'Wrong password or corrupted file';
    }
  }
}

function getAlerts() {
  const alerts = [];
  const V = data.documents?.vessel;
  const I = data.documents?.insurance;
  const C = data.documents?.customs;

  if (V?.expiryDate) {
    const d = daysUntil(V.expiryDate);
    if (d <= 90) alerts.push({color:alertColor(d,90), days:d, text:`Vessel Documentation expires ${d<0?Math.abs(d)+'d ago':'in '+d+'d'}`});
  }
  if (I?.expiryDate) {
    const d = daysUntil(I.expiryDate);
    if (d <= 60) alerts.push({color:alertColor(d,60), days:d, text:`Insurance expires ${d<0?Math.abs(d)+'d ago':'in '+d+'d'}`});
  }
  if (C?.validUntil) {
    const d = daysUntil(C.validUntil);
    if (d <= 60) alerts.push({color:alertColor(d,60), days:d, text:`eTEPAY Transit Log expires ${d<0?Math.abs(d)+'d ago':'in '+d+'d'}`});
  }
  (data.crew||[]).forEach(p => {
    if (p.passportExpiry) {
      const d = daysUntil(p.passportExpiry);
      if (d <= 180) alerts.push({color:alertColor(d,180), days:d, text:`${p.name} — passport expires in ${d}d`});
    }
    if (p.seamanBookExpiry) {
      const d = daysUntil(p.seamanBookExpiry);
      if (d <= 180) alerts.push({color:alertColor(d,180), days:d, text:`${p.name} — seaman book expires in ${d}d`});
    }
    const sd = calcSchengen(p.schengenLog);
    if (sd >= 75) alerts.push({color:sd>=90?'red':'orange', days:90-sd, text:`${p.name} — ${sd} Schengen days used (${90-sd} remaining)`});
  });
  // Maintenance
  getEngines().forEach(eid => {
    const eng = data.maintenance?.engines?.[eid];
    if (!eng) return;
    const h = eng.hours||0;
    (eng.schedule||[]).forEach(t => {
      const st = maintStatus(t, h);
      if (st.color !== 'green') alerts.push({color:st.color, days:t.lastDoneAt+t.interval-h, text:`${engLabel(eid)}: ${t.task} — ${st.label}`});
    });
  });
  return alerts.sort((a,b) => a.days - b.days);
}

function renderAlertBar() {
  const el = document.getElementById('alertBar'); if (!el) return;
  const alerts = getAlerts();
  const open = ui.alertsOpen;
  el.innerHTML = `
    <div class="alert-toggle" onclick="ui.alertsOpen=!ui.alertsOpen;renderAlertBar()">

    }</div>` : ''}`;
}

          </div>`).join('')}
      </div>
    </div>`;
}

function handlePhotoUpload(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 900;
      const ratio = Math.min(1, MAX / Math.max(img.width, img.height));
      canvas.width = img.width * ratio; canvas.height = img.height * ratio;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const section = _photoCtx?.section || ui.photoSub;
      if (!data.photos) data.photos = {};
      if (!data.photos[section]) data.photos[section] = [];
      data.photos[section].push({id:uid(), data:canvas.toDataURL('image/jpeg',0.75), caption:''});
      save(); document.getElementById('mainContent').innerHTML = renderPhotos();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  input.value = '';
}

function deletePhoto(i, section) {
  if (!confirm('Delete this photo?')) return;
  data.photos[section].splice(i,1); save();
  document.getElementById('mainContent').innerHTML = renderPhotos();
}

function savePhotoCaption(section, i, val) {
  if (data.photos?.[section]?.[i]) { data.photos[section][i].caption = val; save(); }
}

function viewPhoto(i, section) {
  const p = data.photos?.[section]?.[i]; if (!p) return;
  showModal(p.caption||'Photo', `<img src="${p.data}" style="width:100%;border-radius:8px">`);
}

function renderMaintenance() {
  const isCat = data.meta.hullType === 'catamaran';
  const engines = getEngines();
  const eid = isCat ? ui.maintEngine : engines[0];
  const eng = data.maintenance?.engines?.[eid] || {hours:0, schedule:[], log:[], customTasks:[]};
  const hours = eng.hours || 0;
  const schedule = eng.schedule?.length ? eng.schedule : freshSchedule();

  return `
    ${isCat ? `
      <div class="subtab-bar">
        <div class="pill ${ui.maintEngine==='port'?'active':''}" onclick="ui.maintEngine='port';document.getElementById('mainContent').innerHTML=renderMaintenance()">
          ⚙️ Port Engine
        </div>
        <div class="pill ${ui.maintEngine==='starboard'?'active':''}" onclick="ui.maintEngine='starboard';document.getElementById('mainContent').innerHTML=renderMaintenance()">
          ⚙️ Starboard Engine
        </div>
      </div>` : ''}
    <div class="card">
      <div class="card-hd">${isCat ? (eid==='port'?'Port':'Starboard')+' Engine ' : ''}Engine Hours</div>
      <div class="hours-box">
        <div class="hours-num">${hours}</div>
        <div class="hours-lbl">hours</div>
        <div class="hours-edit">
          <button class="h-btn" onclick="adjustHours('${eid}',-10)">−10</button>
          <button class="h-btn" onclick="adjustHours('${eid}',-1)">−</button>
          <input class="h-input" type="number" value="${hours}" min="0"
            onblur="setHours('${eid}',this.value)">
          <button class="h-btn" onclick="adjustHours('${eid}',1)">+</button>
          <button class="h-btn" onclick="adjustHours('${eid}',10)">+10</button>
        </div>
      </div>
    </div>

    <div class="sec-hd">Maintenance Schedule — Yanmar Diesel</div>
    <div class="card"><div class="card-body">
      ${schedule.map(t => {
        const st = maintStatus(t, hours);
        return `<div class="maint-row">
          <div class="mdot ${st.color}"></div>
          <div class="m-info">
            <div class="m-task">${esc(t.task)}</div>
            <div class="m-meta">Every ${t.interval}h · Last done at ${t.lastDoneAt}h · Next due at ${t.lastDoneAt+t.interval}h</div>
            <div class="m-due ${st.color}">${st.label}</div>
          </div>
          <button class="btn btn-s btn-xs" onclick="logMaintenanceDone('${eid}','${t.id}',${hours})">✓ Done</button>
        </div>`;
      }).join('')}
    </div></div>

    ${(eng.customTasks||[]).length ? `
      <div class="sec-hd">Custom Tasks</div>
      <div class="card"><div class="card-body">
        ${eng.customTasks.map(t => {
          const st = maintStatus(t, hours);
          return `<div class="maint-row">
            <div class="mdot ${st.color}"></div>
            <div class="m-info">
              <div class="m-task">${esc(t.task)}</div>
              <div class="m-meta">Every ${t.interval}h · Last done at ${t.lastDoneAt}h</div>
              <div class="m-due ${st.color}">${st.label}</div>
            </div>
            <button class="btn btn-s btn-xs" onclick="logCustomDone('${eid}','${t.id}',${hours})">✓ Done</button>
          </div>`;
        }).join('')}
      </div></div>` : ''}

    <div class="btn-row">
      <button class="btn btn-s btn-sm" onclick="showAddCustomTask('${eid}')">+ Custom Task</button>
      <button class="btn btn-s btn-sm" onclick="showAddMaintenanceLog('${eid}')">+ Log Entry</button>
      <button class="btn btn-s btn-sm" onclick="exportSection('maintenance')">⬇ Export</button>
    </div>

    <div class="sec-hd">Maintenance Log</div>
    <div class="card">
      <div style="overflow-x:auto">
        <table class="tbl"><thead><tr><th>Date</th><th>Hours</th><th>Task</th><th>Cost</th><th>Notes</th><th></th></tr></thead>
        <tbody>${(eng.log||[]).slice().reverse().map((l,ri)=>{
          const i = (eng.log.length-1)-ri;
          return `<tr>
            <td>${esc(l.date)}</td><td>${esc(l.hours)}</td><td>${esc(l.task)}</td>
            <td>${esc(l.cost||'')}</td><td>${esc(l.notes||'')}</td>
            <td><button class="btn btn-d btn-xs" onclick="removeMaintenanceLog('${eid}',${i})">✕</button></td>
          </tr>`;
        }).join('') || '<tr><td colspan="6" style="color:var(--label3);padding:12px">No entries</td></tr>'}
        </tbody></table>
      </div>
    </div>`;
}

function adjustHours(eid, delta) {
  ensureEngine(eid);
  data.maintenance.engines[eid].hours = Math.max(0, (data.maintenance.engines[eid].hours||0) + delta);
  save(); renderAlertBar(); document.getElementById('mainContent').innerHTML = renderMaintenance();
}
function setHours(eid, val) {
  ensureEngine(eid);
  data.maintenance.engines[eid].hours = Math.max(0, parseInt(val)||0);
  save(); renderAlertBar();
}
function ensureEngine(eid) {
  if (!data.maintenance) data.maintenance = {engines:{}};
  if (!data.maintenance.engines) data.maintenance.engines = {};
  if (!data.maintenance.engines[eid]) data.maintenance.engines[eid] = {hours:0, schedule:freshSchedule(), log:[], customTasks:[]};
}
function logMaintenanceDone(eid, taskId, currentHours) {
  ensureEngine(eid);
  const sched = data.maintenance.engines[eid].schedule;
  const t = sched.find(x=>x.id===taskId); if (!t) return;
  t.lastDoneAt = currentHours;
  // Auto-add log entry
  if (!data.maintenance.engines[eid].log) data.maintenance.engines[eid].log = [];
  data.maintenance.engines[eid].log.push({
    id:uid(), date:new Date().toISOString().slice(0,10),
    hours:currentHours, task:t.task, cost:'', notes:'Scheduled maintenance completed'
  });
  save(); renderAlertBar(); document.getElementById('mainContent').innerHTML = renderMaintenance();
}
function logCustomDone(eid, taskId, currentHours) {
  ensureEngine(eid);
  const t = data.maintenance.engines[eid].customTasks?.find(x=>x.id===taskId); if (!t) return;
  t.lastDoneAt = currentHours;
  data.maintenance.engines[eid].log = data.maintenance.engines[eid].log || [];
  data.maintenance.engines[eid].log.push({
    id:uid(), date:new Date().toISOString().slice(0,10),
    hours:currentHours, task:t.task, cost:'', notes:'Custom task completed'
  });
  save(); renderAlertBar(); document.getElementById('mainContent').innerHTML = renderMaintenance();
}
function showAddCustomTask(eid) {
  showModal('Add Custom Maintenance Task', `
    <div class="mi-label">Task Description</div><input class="mi" id="m-td" placeholder="e.g. Check anchor chain">
    <div class="mi-label">Interval (hours)</div><input class="mi" id="m-ti" type="number" placeholder="e.g. 100">
    <div class="modal-btns">
      <button class="btn btn-s" onclick="hideModal()">Cancel</button>
      <button class="btn btn-p" onclick="saveCustomTask('${eid}')">Add</button>
    </div>`);
}
function saveCustomTask(eid) {
  ensureEngine(eid);
  if (!data.maintenance.engines[eid].customTasks) data.maintenance.engines[eid].customTasks = [];
  data.maintenance.engines[eid].customTasks.push({
    id:uid(), task:document.getElementById('m-td').value,
    interval:parseInt(document.getElementById('m-ti').value)||100, lastDoneAt:0
  });
  save(); hideModal(); document.getElementById('mainContent').innerHTML = renderMaintenance();
}
function showAddMaintenanceLog(eid) {
  const h = data.maintenance?.engines?.[eid]?.hours || 0;
  showModal('Add Maintenance Log Entry', `
    <div class="mi-label">Date</div><input class="mi" id="m-ld" type="date" value="${new Date().toISOString().slice(0,10)}">
    <div class="mi-label">Engine Hours</div><input class="mi" id="m-lh" type="number" value="${h}">
    <div class="mi-label">Task Performed</div><input class="mi" id="m-lt" placeholder="Description">
    <div class="mi-label">Cost (€)</div><input class="mi" id="m-lc" placeholder="Optional">
    <div class="mi-label">Notes</div><input class="mi" id="m-ln" placeholder="Optional">
    <div class="modal-btns">
      <button class="btn btn-s" onclick="hideModal()">Cancel</button>
      <button class="btn btn-p" onclick="saveMaintenanceLog('${eid}')">Add</button>
    </div>`);

function saveMaintenanceLog(eid) {
  ensureEngine(eid);
  if (!data.maintenance.engines[eid].log) data.maintenance.engines[eid].log = [];
  data.maintenance.engines[eid].log.push({
    id:uid(), date:document.getElementById('m-ld').value,
    hours:document.getElementById('m-lh').value,
    task:document.getElementById('m-lt').value,
    cost:document.getElementById('m-lc').value,
    notes:document.getElementById('m-ln').value
  });
  save(); hideModal(); document.getElementById('mainContent').innerHTML = renderMaintenance();

function removeMaintenanceLog(eid, i) {
  data.maintenance.engines[eid].log.splice(i,1); save();
  document.getElementById('mainContent').innerHTML = renderMaintenance();
}

function renderParts() {
  const parts = data.spareParts || [];
  const q = ui.partsSearch.toLowerCase();
  const cat = ui.partsFilter;
  const cats = ['All', ...new Set(parts.map(p=>p.category).filter(Boolean))];
  const filtered = parts.filter(p => {
    const matchQ = !q || p.desc?.toLowerCase().includes(q) || p.pn?.toLowerCase().includes(q);
    const matchC = cat==='All' || p.category===cat;
    return matchQ && matchC;
  });
  const totalValue = parts.reduce((s,p)=>(s+(p.qty||0)*(p.unitPrice||0)),0).toFixed(2);

  return `
    <div class="parts-top">
      <input class="search-box" placeholder="🔍 Search parts…" value="${esc(ui.partsSearch)}"
        oninput="ui.partsSearch=this.value;document.getElementById('mainContent').innerHTML=renderParts()">
    </div>
    <div class="subtab-bar" style="margin-bottom:10px">
      ${cats.map(c=>`<div class="pill ${ui.partsFilter===c?'active':''}"
        onclick="ui.partsFilter='${esc(c)}';document.getElementById('mainContent').innerHTML=renderParts()">${esc(c)}</div>`).join('')}
    </div>
    <div class="btn-row" style="padding:0 0 10px">
      <button class="btn btn-p btn-sm" onclick="showAddPart()">+ Add Part</button>
      <button class="btn btn-s btn-sm" onclick="exportSection('spareParts')">⬇ Export</button>
    </div>
    <div class="card">
      <div class="card-hd">${filtered.length} items ${cat!=='All'?'('+cat+')':''}</div>
      <div class="card-body">
        ${filtered.map(p => {
          const low = (p.qty||0) <= (p.minQuantity||0);
          const idx = parts.indexOf(p);
          return `<div class="part-row">
            <div class="qty-wrap">
              <button class="qb" onclick="adjQty(${idx},-1)">−</button>
              <div class="qn ${low?'low':''}">${p.qty||0}</div>
              <button class="qb" onclick="adjQty(${idx},1)">+</button>
            </div>
            <div class="p-info">
              <div class="p-desc">${esc(p.desc)} ${low?`<span class="badge b-red">Low</span>`:''}</div>
              <div class="p-meta">${p.pn?esc(p.pn)+' · ':''}${esc(p.category)} · ${esc(p.location||'')} · €${p.unitPrice||0}</div>
            </div>
            <button class="btn btn-d btn-xs no-print" onclick="removePart(${idx})">✕</button>
          </div>`;
        }).join('') || '<div style="padding:16px;color:var(--label3)">No parts match</div>'}
      </div>
      <div class="parts-footer">Total inventory value: €${totalValue}</div>
    </div>`;
}

function adjQty(i, delta) {
  if (!data.spareParts?.[i]) return;
  data.spareParts[i].qty = Math.max(0, (data.spareParts[i].qty||0) + delta);
  save(); document.getElementById('mainContent').innerHTML = renderParts();
}
function removePart(i) {
  if (!confirm('Remove this part?')) return;
  data.spareParts.splice(i,1); save();
  document.getElementById('mainContent').innerHTML = renderParts();
}
function showAddPart() {
  showModal('Add Spare Part', `
    <div class="mi-label">Description</div><input class="mi" id="m-pd" placeholder="Part description">
    <div class="mi-label">Part Number</div><input class="mi" id="m-ppn" placeholder="Optional">
    <div class="mi-label">Category</div><input class="mi" id="m-pc" placeholder="e.g. Yanmar Engine">
    <div class="mi-label">Quantity</div><input class="mi" id="m-pq" type="number" value="1" min="0">
    <div class="mi-label">Min Quantity</div><input class="mi" id="m-pmq" type="number" value="1" min="0">
    <div class="mi-label">Unit Price (€)</div><input class="mi" id="m-pp2" type="number" value="0" min="0" step="0.01">
    <div class="mi-label">Location on Boat</div><input class="mi" id="m-pl" placeholder="e.g. engine bay">

      <button class="btn btn-p" onclick="savePart()">Add</button>
    </div>`);
}
function savePart() {
  if (!data.spareParts) data.spareParts = [];
  data.spareParts.push({
    id:uid(), desc:document.getElementById('m-pd').value,
    pn:document.getElementById('m-ppn').value,
    category:document.getElementById('m-pc').value,

    minQuantity:parseInt(document.getElementById('m-pmq').value)||0,
    unitPrice:parseFloat(document.getElementById('m-pp2').value)||0,
    location:document.getElementById('m-pl').value, notes:''

function deepMerge(target, source) {
  for (const key of Object.keys(source)) {
    if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
      if (!target[key] || typeof target[key] !== 'object') target[key] = {};
      deepMerge(target[key], source[key]);
    } else {
      target[key] = source[key];
    }
  }
}

function renderPasswordSetup() {
  const ov = document.getElementById('setupOv');
  ov.classList.remove('hidden');
  ov.innerHTML = `
    <div class="setup-inner">
      <div class="setup-logo">${logoSrc ? `<img src="${logoSrc}" alt="Oroboro">` : '<div style="font-size:32px">⚓</div>'}</div>
      <div style="font-size:44px;text-align:center;margin-bottom:12px">🔐</div>
      <div class="setup-h">Create a Password</div>
      <div class="setup-sub">All your boat data will be encrypted with AES-256. This password is <b>never stored</b> — only you know it. If you forget it, data cannot be recovered.</div>
      <label class="setup-lbl">Password (min 8 characters)</label>
      <input class="setup-inp" type="password" id="pw-new" placeholder="Enter password"
        oninput="checkPwMatch()" onkeydown="if(event.key==='Enter')createPassword()">
      <label class="setup-lbl">Confirm Password</label>
      <input class="setup-inp" type="password" id="pw-con" placeholder="Confirm password"
        oninput="checkPwMatch()" onkeydown="if(event.key==='Enter')createPassword()">
      <div id="pw-err" style="color:var(--red);font-size:13px;min-height:20px;margin-bottom:8px;text-align:center"></div>
      <button class="setup-go" id="pw-go" onclick="createPassword()">Encrypt &amp; Start →</button>
    </div>`;
}

function checkPwMatch() {
  const a = document.getElementById('pw-new')?.value || '';
  const b = document.getElementById('pw-con')?.value || '';
  const err = document.getElementById('pw-err');
  const go  = document.getElementById('pw-go');
  if (!err) return;
  if (a.length > 0 && a.length < 8) { err.textContent = 'Minimum 8 characters'; }
  else if (b.length > 0 && a !== b)  { err.textContent = 'Passwords do not match'; }
  else { err.textContent = ''; }
  if (go) go.disabled = (a.length < 8 || a !== b);
}

async function createPassword() {
  const pw  = document.getElementById('pw-new')?.value || '';
  const pw2 = document.getElementById('pw-con')?.value || '';
  const err = document.getElementById('pw-err');
  if (pw.length < 8) { if(err) err.textContent = 'Minimum 8 characters'; return; }
  if (pw !== pw2)    { if(err) err.textContent = 'Passwords do not match'; return; }
  if (err) err.textContent = '';
  const go = document.getElementById('pw-go');
  if (go) { go.textContent = 'Encrypting…'; go.disabled = true; }
  try {
    const salt = await getOrCreateSalt();
    const key  = await deriveKey(pw, salt);
    cryptoKey  = key;
    // Store verification canary
    localStorage.setItem(VERIFY_KEY, await aesEncrypt(key, 'BM_VERIFIED'));
    // Save data encrypted
    await save();
    startActivityTracking();
    document.getElementById('setupOv').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    renderApp();
  } catch(e) {
    if (err) err.textContent = 'Encryption failed: ' + e.message;
    if (go) { go.textContent = 'Encrypt & Start →'; go.disabled = false; }
  }
}

// ═══════════════════════════════════════════════════════════
//  LOCK / UNLOCK SCREEN
// ═══════════════════════════════════════════════════════════

function getAttemptState() {
  try { return JSON.parse(localStorage.getItem(ATTEMPTS_KEY)) || { count:0, lockUntil:0 }; }
  catch { return { count:0, lockUntil:0 }; }
}
function setAttemptState(s) { localStorage.setItem(ATTEMPTS_KEY, JSON.stringify(s)); }

let _lockCountdown = null;

function renderLockScreen() {
  const ov = document.getElementById('setupOv');
  ov.classList.remove('hidden');
  const at = getAttemptState();
  const locked = at.lockUntil > Date.now();
  ov.innerHTML = `
    <div class="setup-inner">
      <div class="setup-logo">${logoSrc ? `<img src="${logoSrc}" alt="Oroboro">` : '<div style="font-size:32px">⚓</div>'}</div>
      <div style="font-size:48px;text-align:center;margin-bottom:10px">🔒</div>
      <div class="setup-h" style="text-align:center">Enter Password</div>
      <div class="setup-sub" style="text-align:center">Your data is encrypted. Enter your password to unlock.</div>
      <input class="setup-inp" type="password" id="pw-unlock" placeholder="Password"
        ${locked ? 'disabled' : ''}
        onkeydown="if(event.key==='Enter')attemptUnlock()">
      <div id="unlock-err" style="color:var(--red);font-size:13px;min-height:20px;
        margin-bottom:12px;text-align:center">
        ${at.count > 0 && !locked ? `${at.count} failed attempt${at.count>1?'s':''} — ${MAX_FAILS-at.count} remaining` : ''}
        ${locked ? `<span id="lock-countdown">Too many attempts — locked</span>` : ''}
      </div>
      <button class="setup-go" id="unlock-btn" onclick="attemptUnlock()" ${locked?'disabled':''}>
        ${locked ? 'Locked…' : 'Unlock'}
      </button>

      <div style="display:flex;align-items:center;gap:10px;margin:20px 0 10px">
        <div style="flex:1;height:1px;background:var(--sep)"></div>
        <div style="font-size:12px;color:var(--label3)">RESTORE FROM BACKUP</div>
        <div style="flex:1;height:1px;background:var(--sep)"></div>
      </div>
      <button onclick="document.getElementById('backupFile').click()"
        style="width:100%;border:1.5px solid var(--sep);border-radius:12px;
          padding:13px 16px;font-family:var(--font);font-size:15px;font-weight:600;
          background:var(--surface);color:var(--blue);cursor:pointer;margin-bottom:6px">
        📂 Load Backup File
      </button>
      <div style="font-size:12px;color:var(--label3);text-align:center;line-height:1.5">
        Lost your data after reinstalling? Select your<br>
        <b>oroboro-boat-backup.json</b> from Files / iCloud Drive,<br>
        then enter your password above.
      </div>
    </div>`;
  if (locked) startLockCountdown(at);
  else if (!locked) setTimeout(() => document.getElementById('pw-unlock')?.focus(), 100);
}

function startLockCountdown(at) {
  if (_lockCountdown) clearInterval(_lockCountdown);
  _lockCountdown = setInterval(() => {
    const remaining = Math.ceil((at.lockUntil - Date.now()) / 1000);
    const cd = document.getElementById('lock-countdown');
    const btn = document.getElementById('unlock-btn');
    const inp = document.getElementById('pw-unlock');
    if (remaining <= 0) {
      clearInterval(_lockCountdown);
      at.count = 0; at.lockUntil = 0; setAttemptState(at);
      if (cd)  cd.textContent  = '';
      if (btn) { btn.textContent = 'Unlock'; btn.disabled = false; }
      if (inp) { inp.disabled = false; inp.focus(); }
      document.getElementById('unlock-err').textContent = '';
    } else {
      if (cd) cd.textContent = `Too many attempts — wait ${remaining}s`;
    }
  }, 500);
}

async function attemptUnlock() {
  const at = getAttemptState();
  if (at.lockUntil > Date.now()) return;
  const pw  = document.getElementById('pw-unlock')?.value || '';
  const err = document.getElementById('unlock-err');
  const btn = document.getElementById('unlock-btn');
  if (!pw) { if(err) err.textContent = 'Enter your password'; return; }
  if (btn) { btn.textContent = 'Checking…'; btn.disabled = true; }
  try {
    const salt = await getOrCreateSalt();
    const key  = await deriveKey(pw, salt);
    const stored = localStorage.getItem(VERIFY_KEY);
    if (!stored) throw new Error('No verification data');
    const result = await aesDecrypt(key, stored);
    if (result !== 'BM_VERIFIED') throw new Error('Wrong password');
    // Correct — unlock
    cryptoKey = key;
    at.count = 0; at.lockUntil = 0; setAttemptState(at);
    const found = await load();
    if (!found) { data = JSON.parse(JSON.stringify(EMPTY_DEFAULTS)); }
    startActivityTracking();
    document.getElementById('setupOv').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    renderApp();
  } catch(e) {
    // Wrong password
    at.count++;
    if (at.count >= MAX_FAILS) {
      at.lockUntil = Date.now() + LOCKOUT_MS;
      at.count = MAX_FAILS;
    }
    setAttemptState(at);
    if (btn) { btn.textContent = 'Unlock'; btn.disabled = false; }
    if (err) err.textContent = at.lockUntil > Date.now()
      ? `Too many attempts — locked for ${LOCKOUT_MS/1000}s`
      : `Wrong password — ${MAX_FAILS - at.count} attempt${MAX_FAILS-at.count===1?'':'s'} remaining`;
    if (at.lockUntil > Date.now()) startLockCountdown(at);
    document.getElementById('pw-unlock').value = '';
  }
}

// ═══════════════════════════════════════════════════════════
//  LOCK APP / ACTIVITY TRACKING
// ═══════════════════════════════════════════════════════════

function resetActivity() { lastActivity = Date.now(); }

function startActivityTracking() {
  lastActivity = Date.now();
  document.addEventListener('click',      resetActivity, true);
  document.addEventListener('keydown',    resetActivity, true);
  document.addEventListener('touchstart', resetActivity, true);
  if (lockTimer) clearInterval(lockTimer);
  lockTimer = setInterval(() => {
    if (Date.now() - lastActivity > LOCK_MS) lockApp();
  }, 15000);
}

function lockApp() {
  cryptoKey = null; data = {};
  if (lockTimer) { clearInterval(lockTimer); lockTimer = null; }
  document.removeEventListener('click',      resetActivity, true);
  document.removeEventListener('keydown',    resetActivity, true);
  document.removeEventListener('touchstart', resetActivity, true);
  document.getElementById('app').classList.add('hidden');
  renderLockScreen();
}

// ═══════════════════════════════════════════════════════════
//  BACKUP — save & load encrypted backup files
// ═══════════════════════════════════════════════════════════

async function saveBackup() {
  if (!cryptoKey) { showToast('Unlock the app first', true); return; }
  const salt   = localStorage.getItem(SALT_KEY);
  const verify = localStorage.getItem(VERIFY_KEY);
  const enc    = localStorage.getItem(ENC_KEY);
  if (!salt || !verify || !enc) { showToast('Nothing to back up yet', true); return; }
  const backup = {
    format:  'oroboro-boat-backup-v1',
    created: new Date().toISOString(),
    salt, verify, data: enc
  };
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'oroboro-boat-backup.json';
  a.click();
  localStorage.setItem(BACKUP_TS, Date.now().toString());
  renderBackupBar();
  showToast('Backup saved to Downloads / Files');
}

function loadBackupFile(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const backup = JSON.parse(e.target.result);
      if (backup.format !== 'oroboro-boat-backup-v1') {
        showToast('Not a valid backup file', true); return;
      }
      if (!backup.salt || !backup.verify || !backup.data) {
        showToast('Backup file is incomplete', true); return;
      }
      // Restore encrypted blobs to localStorage
      localStorage.setItem(SALT_KEY,   backup.salt);
      localStorage.setItem(VERIFY_KEY, backup.verify);
      localStorage.setItem(ENC_KEY,    backup.data);
      // Clear any lock-out state
      localStorage.removeItem(ATTEMPTS_KEY);
      // Show lock screen so user enters their password
      document.getElementById('app').classList.add('hidden');
      renderLockScreen();
      showToast('Backup loaded — enter your password to unlock');
    } catch {
      showToast('Could not read backup file', true);
    }
    input.value = '';
  };
  reader.readAsText(file);
}

function renderBackupBar() {
  const el = document.getElementById('backupBar'); if (!el) return;
  const ts  = localStorage.getItem(BACKUP_TS);
  let label;
  if (!ts) {
    label = '<span style="color:var(--orange);font-weight:600">⚠️ Never backed up</span>';
  } else {
    const d = new Date(parseInt(ts));
    const ago = Math.round((Date.now() - d) / 60000);
    const when = ago < 60 ? `${ago}m ago` :
                 ago < 1440 ? `${Math.round(ago/60)}h ago` :
                 d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    label = `Last backup: <b>${when}</b>`;
  }
  el.innerHTML = `
    <div class="backup-bar-txt">${label}</div>
    <button class="btn btn-s btn-xs" onclick="saveBackup()">☁️ Backup now</button>`;
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════

async function init() {
  const hasSalt   = !!localStorage.getItem(SALT_KEY);
  const hasVerify = !!localStorage.getItem(VERIFY_KEY);

  if (hasSalt && hasVerify) {
    // Returning user — show lock screen
    renderLockScreen();
  } else {
    // No local data — show landing screen (restore or new setup)
    renderLandingScreen();
  }
}

window.addEventListener('DOMContentLoaded', init);
</script>
