<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Boat Manager</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Boat Manager">
<link rel="apple-touch-icon" id="appIcon">
<link rel="icon" id="favIcon">


<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="setupOv" class="setup-over hidden"></div>
<div id="app" class="hidden"></div>
<div id="modalOv" class="modal-ov hide">
  <div class="modal-sh" id="modalSh">
    <div class="modal-handle"></div>
    <div id="modalBody"></div>
  </div>
</div>

<input type="file" id="photoFile"    accept="image/*"        onchange="handlePhotoUpload(this)">
<input type="file" id="importFile"  accept=".json"          onchange="handleImport(this)">
<input type="file" id="backupFile"  accept=".json,text/json" onchange="loadBackupFile(this)">
<input type="file" id="jsonImportFile" accept=".json"       onchange="handleJsonImport(this)">

<script src="logo.js"></script>
<script src="oroboro-icon.js"></script>
<script src="oroboro-data.js"></script>


<script src="app.js"></script>
</body>
</html>
